version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data/chroma
    environment:
      - RAG_DOCS_PATH=/app/docs
    env_file:
      - .env
    networks:
      - rag_net

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - rag_net

volumes:
  chroma_data:
  n8n_data:

networks:
  rag_net:
    driver: bridge
